<!DOCTYPE html>
<html>
<head>
    <title>School Dashboard</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        h1 { color: #2c3e50; }
        .card { padding: 15px; background: #f4f4f4; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<h1>🎓 New Era World School Dashboard</h1>

<div class="card">
    <h3>Total Users: {{ users }}</h3>
</div>

<h2>📋 Admission Enquiries</h2>

<table>
    <tr>
        <th>Name</th>
        <th>Class</th>
        <th>Phone</th>
    </tr>

    {% for a in admissions %}
    <tr>
        <td>{{ a.name }}</td>
        <td>{{ a.class }}</td>
        <td>{{ a.phone }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
